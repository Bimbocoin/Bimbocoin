<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bimbo Coin (BMC)</title>
    <style>
        :root {
            --primary: #e5b847; 
            --accent-gold: #d400ff;
            --pure-white: #ffffff;
            --bg: #182645;
            --text-secondary: #86a692;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--pure-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 900px; padding: 2rem; }
        .logo { width: 150px; height: 150px; margin-bottom: 20px; border-radius: 50%; box-shadow: 0 0 30px rgba(130, 71, 229, 0.4); border: 2px solid var(--accent-gold); }
        
        h1 { font-size: 4rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .Bimbo { color: var(--pure-white); font-weight: 700; }
        .Coin { color: var(--accent-gold); font-weight: 800; }

        p { font-size: 1.2rem; line-height: 1.6; color: var(--text-secondary); max-width: 600px; margin: 0 auto; }
        
        /* Aliniere pe un singur rând */
        .stats { 
            display: flex; 
            justify-content: space-between; 
            gap: 15px; 
            margin-top: 40px; 
        }
        .stat-card { 
            flex: 1; /* Toate chenarele vor avea lățime egală */
            background: rgba(255, 255, 255, 0.03); 
            padding: 20px 10px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 215, 0, 0.2); 
        }
        .stat-card h3 { margin: 0; color: var(--primary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0; font-size: 1.3rem; font-weight: bold; color: var(--pure-white); }
        
        .contract { margin-top: 40px; padding: 20px; background: #1e293b; border-radius: 12px; word-break: break-all; font-family: monospace; border: 1px solid var(--primary); color: var(--accent-gold); }
        .btn { display: inline-block; margin-top: 30px; padding: 15px 40px; background: linear-gradient(45deg, var(--primary), #a855f7); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); }

        /* Responsivitate pentru ecrane mici */
        @media (max-width: 600px) {
            .stats { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="BMC Logo" class="logo">
        
        <h1><span class="Bimbo">Bimbo</span><span class="Coin">Coin</span></h1>
        
        <p>A premier digital asset on the Polygon Network.</p>
        
        <div class="stats">
            <div class="stat-card"><h3>Total Supply</h3><p>10,000,000</p></div>
            <div class="stat-card"><h3>Network</h3><p>Polygon</p></div>
        </div>
        
        <div class="contract">
            <small style="color: #36537d;">Official Smart Contract:</small><br>
            0xE260b2D391761398378B9b437Ec5c536c0A3f719
        </div>
        
        <a href="https://polygonscan.com/token/0xe260b2d391761398378b9b437ec5c536c0a3f719" target="_blank" class="btn">Explore on Polygonscan</a>
    </div>
</body>
</html>
