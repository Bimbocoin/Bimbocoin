<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bimbo Coin (BMC)</title>
    <style>
        :root {
            --primary: #e5b847;
            --accent-gold: #d400ff;
            --pure-white: #ffffff;
            --bg: #182645;
            --text-secondary: #86a692;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--pure-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 900px; padding: 2rem; margin: 0 auto; }
        .logo { width: 150px; height: 150px; margin-bottom: 20px; border-radius: 50%; box-shadow: 0 0 30px rgba(130, 71, 229, 0.4); border: 2px solid var(--accent-gold); }
        h1 { font-size: 4rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        .Bimbo { color: var(--pure-white); font-weight: 700; }
        .Coin { color: var(--accent-gold); font-weight: 800; }
        p { font-size: 1.2rem; line-height: 1.6; color: var(--text-secondary); max-width: 600px; margin: 0 auto; }

        .stats {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 40px;
        }
        .stat-card {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px 10px;
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .stat-card h3 { margin: 0; color: var(--primary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0; font-size: 1.3rem; font-weight: bold; color: var(--pure-white); }

        .contract {
            margin-top: 40px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            word-break: break-all;
            font-family: monospace;
            border: 1px solid var(--primary);
            color: var(--accent-gold);
        }

        /* Social Links Grid */
        .social-grid {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 16px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            color: var(--pure-white);
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
            transition: transform 0.2s, background 0.2s;
        }
        .social-btn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.10); }
        .social-btn svg { flex-shrink: 0; width: 18px; height: 18px; }

        .btn-telegram    { border-color: rgba(41,182,246,0.35);  background: rgba(41,182,246,0.08); }
        .btn-patreon     { border-color: rgba(255,102,0,0.35);   background: rgba(255,102,0,0.08); }
        .btn-instagram   { border-color: rgba(214,73,143,0.35);  background: rgba(214,73,143,0.08); }
        .btn-binance     { border-color: rgba(243,186,47,0.35);  background: rgba(243,186,47,0.08); }
        .btn-cmc-profile { border-color: rgba(52,211,153,0.35);  background: rgba(52,211,153,0.08); }
        .btn-youtube     { border-color: rgba(255,0,0,0.35);     background: rgba(255,0,0,0.08); }
        .btn-x           { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); }
        .btn-cmc         { border-color: rgba(52,211,153,0.35);  background: rgba(52,211,153,0.08); }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(45deg, var(--primary), #a855f7);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); }

        @media (max-width: 600px) {
            .stats { flex-direction: column; }
            h1 { font-size: 2.6rem; }
            .social-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
